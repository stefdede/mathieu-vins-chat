<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mathieu Vins — Sommelier</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bord: #6b1a2a;
      --bord-dark: #4e1220;
      --bord-light: #8b2a3e;
      --cream: #faf7f2;
      --cream-dark: #f0ebe0;
      --gold: #b8973a;
      --dark: #1a0f0f;
      --gray: #7a6a6a;
      --border: #e8ddd0;
      --white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; background: var(--cream); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .header {
      background: var(--bord-dark);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(78,18,32,0.3);
    }
    .header-avatar {
      width: 44px; height: 44px;
      background: rgba(184,151,58,0.2);
      border: 1.5px solid var(--gold);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .header-info { flex: 1; }
    .header-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--cream); letter-spacing: 0.3px; }
    .header-sub { font-size: 11.5px; color: rgba(250,247,242,0.6); display: flex; align-items: center; gap: 5px; margin-top: 2px; font-weight: 300; letter-spacing: 0.5px; }
    .online-dot { width: 6px; height: 6px; background: #a8d5a2; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .header-badge { font-size: 10px; font-weight: 500; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; border: 1px solid rgba(184,151,58,0.5); padding: 3px 8px; border-radius: 4px; }

    .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row { display: flex; gap: 8px; align-items: flex-end; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; background: var(--bord); }
    .msg-avatar.user-av { background: var(--dark); font-size: 10px; font-weight: 600; color: var(--cream); letter-spacing: 0.5px; }

    .bubble { max-width: 78%; padding: 11px 15px; font-size: 14px; line-height: 1.6; }
    .bubble.bot { background: var(--white); color: var(--dark); border-radius: 16px 16px 16px 4px; box-shadow: 0 1px 8px rgba(107,26,42,0.08); border: 1px solid var(--border); }
    .bubble.user { background: var(--bord); color: var(--cream); border-radius: 16px 16px 4px 16px; }
    .bubble a { color: var(--bord); font-weight: 600; text-decoration: none; border-bottom: 1px solid rgba(107,26,42,0.3); transition: border-color 0.2s; }
    .bubble a:hover { border-color: var(--bord); }
    .bubble.user a { color: var(--gold); border-color: rgba(184,151,58,0.4); }

    .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 12px 15px; }
    .typing-dot { width: 7px; height: 7px; background: var(--bord-light); border-radius: 50%; animation: bounce 1.2s infinite; opacity: 0.6; }
    .typing-dot:nth-child(2){animation-delay:0.2s} .typing-dot:nth-child(3){animation-delay:0.4s}
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .suggestions { padding: 0 16px 8px; display: flex; flex-wrap: wrap; gap: 7px; flex-shrink: 0; }
    .chip { background: var(--white); border: 1.5px solid var(--border); color: var(--dark); font-size: 12.5px; font-family: 'Jost',sans-serif; font-weight: 500; padding: 6px 13px; border-radius: 20px; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
    .chip:hover { border-color: var(--bord); color: var(--bord); background: #fdf5f6; }

    .input-area { background: var(--white); border-top: 1px solid var(--border); padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    .input-wrap { flex: 1; background: var(--cream); border: 1.5px solid var(--border); border-radius: 14px; display: flex; align-items: center; padding: 0 14px; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--bord); }
    textarea { flex: 1; background: transparent; border: none; outline: none; font-family: 'Jost',sans-serif; font-size: 14px; color: var(--dark); resize: none; padding: 12px 0; max-height: 100px; line-height: 1.4; }
    textarea::placeholder { color: #c0b0b0; }

    .send-btn { width: 42px; height: 42px; background: var(--bord); border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; flex-shrink: 0; }
    .send-btn:hover { background: var(--bord-dark); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.97); }
    .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: var(--cream); }

    .footer-note { text-align: center; font-size: 11px; color: #b0a0a0; padding: 4px 16px 10px; flex-shrink: 0; letter-spacing: 0.3px; }
    .footer-note a { color: var(--bord); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-avatar">🍷</div>
    <div class="header-info">
      <div class="header-name">Votre Sommelier Mathieu Vins</div>
      <div class="header-sub"><span class="online-dot"></span> En ligne — Conseils personnalisés</div>
    </div>
    <div class="header-badge">Cave</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="suggestions" id="suggestions">
    <button class="chip" onclick="sendChip(this)">🍷 Conseille-moi un vin rouge</button>
    <button class="chip" onclick="sendChip(this)">🥂 Champagne & pétillants</button>
    <button class="chip" onclick="sendChip(this)">🌿 Vins bio</button>
    <button class="chip" onclick="sendChip(this)">🎁 Idée cadeau</button>
    <button class="chip" onclick="sendChip(this)">👨‍🌾 Nos vignerons</button>
    <button class="chip" onclick="sendChip(this)">🏷️ Promotions</button>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Posez votre question au sommelier..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="footer-note">
    <a href="https://www.mathieuvins.ch" target="_blank">Mathieu Vins</a> · Vins fins d'origine · Aclens, Suisse 🇨🇭
  </div>

  <script>
    const API_URL = '/api/chat';
    const history = [];
    let loading = false;
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    function fmt(text) {
      let h = text.replace(/\[LINK\]\{([^}]+)\}\{([^}]+)\}/g, '<a href="$1" target="_blank">$2</a>');
      h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/\n/g, '<br>');
      return h;
    }

    function addMsg(role, text) {
      const row = document.createElement('div'); row.className = 'msg-row ' + role;
      const av = document.createElement('div'); av.className = 'msg-avatar' + (role==='user'?' user-av':''); av.textContent = role==='user'?'Vous':'🍷';
      const bub = document.createElement('div'); bub.className = 'bubble '+(role==='user'?'user':'bot'); bub.innerHTML = fmt(text);
      row.appendChild(av); row.appendChild(bub);
      messagesDiv.appendChild(row);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTyping() {
      const row = document.createElement('div'); row.className = 'msg-row'; row.id = 'typing-row';
      const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = '🍷';
      const bub = document.createElement('div'); bub.className = 'bubble bot';
      bub.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      row.appendChild(av); row.appendChild(bub); messagesDiv.appendChild(row);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() { const t = document.getElementById('typing-row'); if(t) t.remove(); }

    function sendMessage(txt) {
      const msg = (txt || userInput.value).trim();
      if (!msg || loading) return;
      document.getElementById('suggestions').style.display = 'none';
      userInput.value = ''; autoResize(userInput);
      loading = true; sendBtn.disabled = true;
      addMsg('user', msg);
      history.push({ role: 'user', content: msg });
      showTyping();
      fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ messages: history }) })
        .then(r => r.json()).then(data => {
          hideTyping();
          if (data.error) throw new Error(data.error);
          history.push({ role: 'assistant', content: data.content });
          addMsg('assistant', data.content);
        }).catch(() => { hideTyping(); addMsg('assistant', 'Désolé, une erreur est survenue. Visitez [LINK]{https://www.mathieuvins.ch/contact}{notre site} pour nous contacter.'); })
        .finally(() => { loading = false; sendBtn.disabled = false; userInput.focus(); });
    }

    function sendChip(btn) { sendMessage(btn.textContent.replace(/^\S+ /, '').trim()); }
    function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }

    window.addEventListener('load', () => {
      setTimeout(() => {
        addMsg('assistant', 'Bienvenue chez **Mathieu Vins** ! 🍷\n\nJe suis votre sommelier virtuel. Que ce soit pour un accord mets-vins, un cadeau, ou simplement découvrir nos [LINK]{https://www.mathieuvins.ch/producers}{vignerons passionnés}, je suis là pour vous guider.\n\nComment puis-je vous aider ?');
      }, 300);
    });
  </script>
</body>
</html>
